<!DOCTYPE html>
<html lang="en">

<!-- https://media.tenor.com/c_xe3Yu68MMAAAAM/%D0%B7%D0%B0%D1%8F%D1%86-%D1%87%D0%B0%D1%81%D1%8B.gif -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSUK Deadline !!!!!</title>

    <meta name="title" content="FSUK Deadline !!!!!">
    <meta name="description" content="how many days until July 13th ?">

    <!-- Open Graph / Facebook / WhatsApp / Notion -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://usbt0p.github.io/deadline.html">
    <meta property="og:title" content="FSUK Deadline Countdown 🫵🏻">
    <meta property="og:description" content="Checking the clock for Auria... Click to see the days and weeks left.">
    <meta property="og:image"
        content="https://media.tenor.com/c_xe3Yu68MMAAAAM/%D0%B7%D0%B0%D1%8F%D1%86-%D1%87%D0%B0%D1%81%D1%8B.gif">

    <script>
        window.onload = function () {
            // Note: Month is 0-indexed in JS, so 6 is July.
            const targetDate = new Date(2026, 6, 13);
            const today = new Date();

            // Strip the time to calculate full calendar days difference
            targetDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);

            // milliseconds
            const diffTime = targetDate - today;

            // days and weeks (if target date has passed, use 0)
            const diffDays = diffTime > 0 ? Math.round(diffTime / (1000 * 60 * 60 * 24)) : 0;
            const diffWeeks = Math.floor(diffDays / 7); // Round weeks down

            const emojis = ["🚨", "⚠️", "📢", "🔥", "💡", "🆘", "🧨", "‼️", "💥", "🫨", "👀", "👩‍💻", "🗣", "🫵🏻", "🧘🏼‍♂️", "☕️", "🏎", "🚗", "🔊", "🏁", "🗿", "💹", "🚟"];
            const randomEmoji1 = emojis[Math.floor(Math.random() * emojis.length)];
            const randomEmoji2 = emojis[Math.floor(Math.random() * emojis.length)];

            // URL fragment example: FSUK  🚨 Días: <days> Semanas: <weeks>
            const text = `FSUK  ${randomEmoji1}${randomEmoji2} Días: ${diffDays} Semanas: ${diffWeeks}`;
            const targetUrl = `https://bigtext.net/#${encodeURIComponent(text)}`;

            // Perform the redirect!
            window.location.href = targetUrl;
        };
    </script>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .loader {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="loader">
        <h2>Redirecting to countdown...</h2>
    </div>
</body>

</html>
